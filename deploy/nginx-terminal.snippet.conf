# Web-terminal locations for the ConvoroCP panel vhost.
# Add these inside the panel `server { ... }` block (alongside `location /`).
#
# Flow: browser loads the /terminal Inertia page, which iframes /tty/.
# Every request to /tty/ (including the websocket upgrade) triggers an
# auth_request subrequest to Laravel's /terminal/check, which returns 204 only
# for an authenticated operator (401 unauth, 403 for clients). ttyd itself binds
# 127.0.0.1 and is never exposed directly.

location = /__termcheck {
    internal;
    proxy_pass http://127.0.0.1:80/terminal/check;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
}

location /tty/ {
    auth_request /__termcheck;
    proxy_pass http://127.0.0.1:13715;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
}
