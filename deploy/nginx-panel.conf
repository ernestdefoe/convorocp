server {
    listen 8000 ssl default_server;
    listen [::]:8000 ssl default_server;
    server_name convorocp.convoro.co _;

    ssl_certificate /etc/letsencrypt/live/convorocp.convoro.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/convorocp.convoro.co/privkey.pem;

    root /var/www/convorocp/public;
    index index.php;
    charset utf-8;
    client_max_body_size 64m;

    location / { try_files $uri $uri/ /index.php?$query_string; }

    # Web terminal (ttyd), gated to operators via auth_request -> Laravel (https loopback).
    location = /__termcheck {
        internal;
        proxy_pass https://127.0.0.1:8000/terminal/check;
        proxy_ssl_verify off;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }
    location /tty/ {
        auth_request /__termcheck;
        proxy_pass http://127.0.0.1:13715;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param HTTPS on;
    }
    location ~ /\.(?!well-known).* { deny all; }
}
