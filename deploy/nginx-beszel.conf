# Beszel monitoring hub — operator-gated, embedded by ConvoroCP.
# Hub runs loopback on 127.0.0.1:8099. Adjust server_name / cert paths / host.
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name server.example.com _;

    ssl_certificate /etc/letsencrypt/live/server.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/server.example.com/privkey.pem;

    # Reuse ConvoroCP's operator check (204 operator / 403 client / 401 unauth).
    location = /__beszelcheck {
        internal;
        proxy_pass https://127.0.0.1:8000/terminal/check;
        proxy_ssl_verify off;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        auth_request /__beszelcheck;
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_buffering off;

        # Let the ConvoroCP panel (:8000, different port = different origin) frame it.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors https://server.example.com:8000 https://server.example.com:8443" always;
    }
}
